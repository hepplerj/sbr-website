baseURL = "https://governingground.org/"
languageCode = "en-us"
title = "Governing Ground"
theme = "sagebrush"
enableGitInfo = false
enableEmoji = false

[params]
  subtitle = "A century of sagebrush rebellions"
  description = "A history of the sagebrush rebellions — recurring fights over land, power, and federal authority in the American West from the 1930s to the 2020s."
  author = "Jason A. Heppler"
  heroImage = "images/hero_mt.jpg"
  heroCredit = "John Kakuk / Unsplash"
  heroCreditURL = "https://unsplash.com/@lensatic"
  citationStyle = "chicago"

[params.social]
  github = "hepplerj/sbr-website"

[menu]
  [[menu.main]]
    name = "Sightlines"
    url = "/sightlines/"
    weight = 10
  [[menu.main]]
    name = "Data"
    url = "/data/"
    weight = 20
  [[menu.main]]
    name = "Bibliography"
    url = "/sources/"
    weight = 30
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 40
  [[menu.main]]
    name = "Writing"
    url = "/narrative/"
    weight = 50

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      footnote = true
      [markup.goldmark.extensions.typographer]
        disable = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

[outputs]
  # RSS is opted into per-section via `outputs:` frontmatter on the
  # section's _index.md. Currently: /narrative/ (the main site feed)
  # and /updates/ (the changelog feed). Other sections emit HTML only.
  home = ["HTML"]
  section = ["HTML"]
  taxonomy = ["HTML"]
  term = ["HTML"]

[taxonomies]
  tag = "tags"
  theme = "themes"
  place = "places"

[build]
  [[build.cachebusters]]
    source = "assets/.*\\.(js|ts|jsx|tsx)"
    target = "(js|scripts|javascript)"
  [[build.cachebusters]]
    source = "(postcss|tailwind)\\.config\\.js"
    target = "css"
  [[build.cachebusters]]
    source = "assets/.*\\.(css|scss|sass)"
    target = "(css|styles|scss|sass)"

[module]
  [module.hugoVersion]
    extended = true
    min = "0.128.0"
