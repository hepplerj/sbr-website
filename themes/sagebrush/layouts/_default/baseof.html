<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
  {{- partial "head.html" . -}}
</head>
<body class="{{ with .Type }}page--{{ . }}{{ end }} {{ if .IsHome }}page--home{{ end }}">
  <a class="skip-link" href="#main">Skip to main content</a>
  <div class="site">
    {{- partial "header.html" . -}}
    <main class="site__main" id="main" tabindex="-1">
      {{- block "main" . }}{{- end }}
    </main>
    {{- partial "footer.html" . -}}
  </div>
</body>
</html>
