<header class="site-header">
  <div class="site-header__inner">
    <h1 class="site-title">
      <a href="{{ "/" | relURL }}">
        {{ .Site.Title }}
        <span class="site-title__sub">{{ .Site.Params.subtitle | default "A digital history of the American West" }}</span>
      </a>
    </h1>
    <nav class="site-nav" aria-label="Primary">
      <ul>
        {{- range .Site.Menus.main }}
          {{- $active := or (eq $.RelPermalink .URL) (and (ne .URL "/") (hasPrefix $.RelPermalink .URL)) }}
          <li>
            <a href="{{ .URL | relURL }}"{{ if $active }} aria-current="page"{{ end }}>{{ .Name }}</a>
          </li>
        {{- end }}
      </ul>
    </nav>
  </div>
</header>
